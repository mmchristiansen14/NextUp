<!DOCTYPE html>
<html lang="en">

<head>
    <!-- changes the word in the tab header-->
    <title>NextUp</title>

    <!-- connects style to page where rel is relationship and href is path to file-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <!-- changes the word at the top of the web page-->
        <h1>NextUp</h1>

        <!-- adds a paragraph of text-->
        <p>Your weighted task randomizer.</p>
    </header>

    <section class="add-task">

        <h2>Add a Task</h2>

        <!-- the hyphenated phrase creates the textbox-->
        <input id="group-input" placeholder="Group">

        <input id="task-input" placeholder="Task">

        <div class="star-selector">

            <p>Weight:</p>

            <span class="star" data-value="1">☆</span>
            <span class="star" data-value="2">☆</span>
            <span class="star" data-value="3">☆</span>
            <span class="star" data-value="4">☆</span>
            <span class="star" data-value="5">☆</span>

        </div>

        <button id="add-button">
            Add Task
        </button>

    </section>

    <!--creates containers for information as columns-->
    <div class="task-board">

        <!-- this is my headers column and these are empty group placeholders-->
        <div id="group-column">
        </div>

        <div id="task-column">
        </div>

    </div>

    <section>
        <!-- creates a button (doesn't give it function) but id gives it a name -->
        <button id="generate-button">Generate Task</button>
    </section>

    <div class="selected-task">

        <h2>Next Up:</h2>

        <div id="selected-display">
            Nothing selected yet
        </div>

    </div>

    <script src="script.js"> </script>
</body>

</html>
