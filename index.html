<!DOCTYPE html>
<html lang="en">

<head>
    <!-- changes the word in the tab header-->
    <title>NextUp</title>

    <!-- connects style to page where rel is relationship and href is path to file-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <!-- changes the word at the top of the web page-->
        <h1>NextUp</h1>

        <!-- adds a paragraph of text-->
        <p>Your weighted task randomizer.</p>
    </header>

    <section class="add-task">

        <h2>Add a Task</h2>

        <div class="group-container">

            <button id="new-group-button">
                + New Group
            </button>

            <!-- the hypenated select creates the dropdown -->
            <select id="group-select">

                <option value="">
                    Select a Group
                </option>

            </select>

        </div>

        <!-- the hyphenated input creates the textbox-->
        <input id="task-input" placeholder="Task">

        <div class="star-selector">

            <p>Weight:</p>

            <span class="star" data-value="1">☆</span>
            <span class="star" data-value="2">☆</span>
            <span class="star" data-value="3">☆</span>
            <span class="star" data-value="4">☆</span>
            <span class="star" data-value="5">☆</span>

        </div>

        <button id="add-button">
            Add Task
        </button>

    </section>

    <!--creates containers for information as columns-->
    <div class="task-board">

        <!-- this is my headers column and these are empty group placeholders-->
        <div id="group-column">
        </div>

        <div id="task-column">
        </div>

    </div>

    <section>
        <!-- creates a button (doesn't give it function) but id gives it a name -->
        <button id="generate-button">Generate Task</button>
    </section>

    <div class="selected-task">

        <h2>Next Up:</h2>

        <div id="selected-display">
            Nothing selected yet
        </div>

    </div>

    <div id="group-popup">

        <div class="popup-content">

            <button id="close-popup">✕</button>

            <h2>Create New Group</h2>

            <input id="new-group-name" placeholder="Group Name">

            <h3>Choose a Color</h3>

            <div class="color-palette">
                <div class="color-circle blue" data-color="#8ecae6"></div>
                <div class="color-circle green" data-color="#90be6d"></div>

                <div class="color-circle purple" data-color="#c77dff"></div>

                <div class="color-circle yellow" data-color="#ffd166"></div>

                <div class="color-circle red" data-color="#ef476f"></div>

                <div class="color-circle orange" data-color="#ff9f1c"></div>
            </div>

            <button id="create-group-button">
                Create Group
            </button>

        </div>

    </div>

    <script src="script.js"> </script>
</body>

</html>
